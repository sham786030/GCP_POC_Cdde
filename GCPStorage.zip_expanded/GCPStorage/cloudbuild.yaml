steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/projectforpoc-489612/gcp-poc-app', '.']

images:
  - 'gcr.io/projectforpoc-489612/gcp-poc-app'

options:
  # Requirement (c): Use Cloud Logging for custom service accounts
  logging: CLOUD_LOGGING_ONLY
  # Explicitly define the identity for the build
  serviceAccount: 'projects/projectforpoc-489612/serviceAccounts/shamim-service-account@projectforpoc-489612.iam.gserviceaccount.com'